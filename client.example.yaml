# ============================================================
# DADOS DO NEGOCIO - Preencha com as informacoes do cliente
# Copie este arquivo para client.yaml e edite os valores.
# ============================================================

# Nicho do negocio - define qual prompt em app/prompts/{niche}.j2
# e usado pela IA. Nichos suportados estao em app/prompts/.
# Se omitido, usa "academia" por padrao.
niche: "academia"

business:
  name: "AJE DE BOXE"
  type: "academia de boxe"
  address: "RUA FREI MAURO, 31 - ADRIANOPOLIS"

assistant:
  name: "Vic"
  # greeting é injetado dinamicamente pelo código (prompt.py) com base no
  # horário de São Paulo: "bom dia" / "boa tarde" / "boa noite". Qualquer
  # valor informado aqui é ignorado — deixe em branco ou omita o campo.
  greeting: ""

location:
  parking: "Estacionamento facilitado ao lado do Emporio DB V8"
  structure: >
    Banheiros feminino e masculino com chuveiros e espelhos de corpo inteiro,
    ambiente climatizado com ar-condicionado, musica e WiFi, ringue, sacos de
    pancada tradicionais e diferenciados, equipamentos de musculacao (halteres
    e anilhas), itens para treino funcional, area de aquecimento, espaco para
    alongamento, banheira para imersao no gelo, tatames e espelhos em todo o espaco.

audience:
  min_age: 7
  max_age_note: "sem limite superior de idade (ate 60+)"
  levels: "iniciante, intermediario e avancado"
  modalities:
    - "Boxe tradicional"
    - "Boxe Fitness (emagrecimento e resistencia)"
    - "Sparring (evolucao tecnica e competitiva)"
    - "Preparacao de competidores (local, nacional, internacional)"
    - "Personal Fight (na academia ou em domicilio)"

schedule:
  class_duration: "1 hora"
  class_note: "por agendamento, supervisionadas por professor especializado"
  weekdays:
    morning: ["5h", "6h", "7h", "8h", "9h", "10h"]
    afternoon: ["14h", "15h", "16h", "17h"]
    evening: ["18h", "19h", "20h", "21h"]
  saturday:
    morning: ["9h", "10h"]
  sunday:
    morning: ["10h"]

teachers:
  - name: "JACKSON DE PAULA VELASCO"
    bio: >
      Professor e treinador com trajetoria consolidada no boxe, MMA e luta livre.
      Experiencia real de combate, didatica clara e olhar tecnico apurado.
      Metodo: disciplina e constancia, aprimoramento tecnico real, treinos
      intensos e inteligentes, fortalecimento mental. Transforma iniciantes em
      praticantes confiantes e atletas em competidores preparados.
  - name: "BARBARA BACELAR VELASCO"
    bio: >
      Mais de 5 anos de experiencia no ensino do boxe. Formada em Psicologia e
      certificada como professora treinadora de boxe por Carlos Fiola. Atuacao
      voltada para boxe fitness, com forte presenca no publico feminino. Trabalho
      diferenciado com criancas e adolescentes. Aulas dinamicas, motivadoras e
      acessiveis.

trial_class:
  free: true
  requires_scheduling: true
  dress_code: "convencional de academia, descalco ou sapatilha de boxe"
  equipment_note: >
    Nas duas primeiras aulas nao precisa de material. Na sequencia o aluno
    precisa ter material proprio (luvas e bandagem).

plans:
  - name: "Plano Mensal (academia)"
    price: "R$ 250,00 por mes"
    description: "Acesso livre a todos os horarios, de segunda a domingo."
  - name: "Plano Elite AJE 5AM e 23H (academia)"
    price: "R$ 300,00 por mes"
    description: "Treinos exclusivos nos horarios 05h e 23h, segunda a sexta. Turmas reduzidas, ambiente focado. Vagas limitadas."
  - name: "Plano Trimestral (academia)"
    price: "R$ 600,00 por trimestre"
    description: "Acesso livre a todos os horarios, todos os dias. Melhor custo-beneficio."
  - name: "Plano Mensal Personal (academia)"
    price: "R$ 800,00 por mes"
    description: "Acompanhamento individualizado, horarios agendados, de segunda a domingo."
  - name: "Plano Mensal Personal Domicilio 2x/semana"
    price: "R$ 800,00 por mes"
    description: "8 aulas mensais na residencia do aluno."
  - name: "Plano Mensal Personal Domicilio 3x/semana"
    price: "R$ 1.200,00 por mes"
    description: "12 aulas mensais na residencia do aluno."

payment:
  methods: ["PIX", "debito", "credito"]
  enrollment_fee: false
  cancellation_fee: false
  makeup_policy: "Reposicao de aulas apenas nos planos Personal, com alinhamento previo com o professor."

benefit_platforms:
  - name: "GymPass/WellHub"
    note: "Acesso liberado a partir do plano BASIC."
  - name: "TotalPass"
    note: "Check-in obrigatorio para aula experimental via plataforma."

promotions:
  - name: "PROJETO 30 DIAS DE TRANSFORMACAO AJE"
    details:
      - "Aula experimental 100% gratuita"
      - "Sem taxa de matricula"
      - "Acesso liberado a todos os treinos (domingo a domingo)"
      - "Flexibilidade total de horarios"
      - "Treinos personalizados conforme objetivo"
      - "Acompanhamento direto dos professores"
      - "BONUS: aluno pode trazer 1 amigo(a) para treinar gratuitamente por 7 dias, com condicao especial para matricula ao final."
      - "Condicao especial para novos alunos que fecharem apos a aula experimental."

differentials:
  - "Estrutura moderna e climatizada, com ringue, sacos de pancada e area de musculacao"
  - "Treinos supervisionados por professores de alto nivel"
  - "Vestiarios amplos com chuveiros e espelhos de corpo inteiro"
  - "Banheira de imersao no gelo para recuperacao"
  - "Ambiente agradavel com musica e WiFi"
  - "Localizacao privilegiada com estacionamento facilitado"

# Midias que a IA pode enviar via tags no prompt.
# Formato: "[TAG]": {url: "https://...", type: "image|document|video"}
media: {}
  # "[IMAGEM_ACADEMIA]":
  #   url: "https://exemplo.com/foto_academia.jpg"
  #   type: "image"

# ============================================================
# AGENDAMENTO (exclusivo do plano pleno)
# ============================================================
# Define onde os agendamentos gerados pela IA sao persistidos.
# A IA emite a flag [AGENDAR=<iso-datetime>|<modalidade>] e o consumer
# cria o evento no backend escolhido.
appointments:
  source: "google_calendar"      # "google_calendar" | "external_system"
  google_calendar:
    calendar_id: ""              # ID do calendario (compartilhado com o Service Account)
  external_system:
    type: "cloudgym"             # driver usado quando source=external_system
  slot_duration_minutes: 60      # duracao padrao de um slot
  lead_time_minutes: 60          # antecedencia minima entre agendamento e aula
  business_hours:                # janela de funcionamento usada para sugerir slots
    mon_fri: ["06:00-22:00"]
    sat: ["09:00-13:00"]
    sun: []

# ============================================================
# FOLLOW-UPS AUTOMATICOS (exclusivo do plano pleno)
# ============================================================
# Jobs disparados pelo scheduler.py (APScheduler).
followups:
  reactivation:
    enabled: true
    inactive_hours: 24           # dispara apos N horas sem resposta do lead
    max_stages: 3                # ate N tentativas de reativacao
    day_of_week: "mon-fri"       # apenas dias uteis
    cadence_minutes: 1           # frequencia do job (em minutos)
  appointment_reminder:
    enabled: true
    hours_before: 3              # envia lembrete X horas antes do agendamento
    cadence_minutes: 15          # frequencia do job (em minutos)
  templates:
    reactivation_stage_1: "Oi {nome}, passando pra saber se ainda tem interesse!"
    reactivation_stage_2: "Oi {nome}, consegui um horario especial pra voce — quer aproveitar?"
    reactivation_stage_3: "Oi {nome}, ultima chance — posso segurar sua vaga?"
    appointment_reminder: "Lembrete: sua aula e hoje as {horario}. Te esperamos!"
