name: Build and Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita corrida na tag :latest. A esteira de onboarding empurra vários commits em
# segundos (docker-compose, .gitignore, client.yaml). Sem isso, builds concorrentes
# publicam :latest e o ÚLTIMO a terminar vence — que pode ser um commit ANTERIOR ao
# client.yaml, subindo uma imagem sem o arquivo (container crasha em "client.yaml nao
# encontrado"). cancel-in-progress cancela os builds antigos, deixando só o do último
# commit (client.yaml) escrever o :latest.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        if: success()
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL not set, skipping redeploy."
            exit 0
          fi
          curl -fsSLk -X POST "$PORTAINER_WEBHOOK_URL"
